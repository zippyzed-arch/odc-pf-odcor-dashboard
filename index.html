<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ODC PF Environment Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;flex-direction:column;height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;color:#f0f6fc}
.header .sub{font-size:11px;color:#8b949e;margin-top:2px}
.stats{display:flex;gap:16px;flex-wrap:wrap}
.stat{text-align:center;min-width:70px}
.stat .val{font-size:20px;font-weight:600;color:#58a6ff}
.stat .val.ok{color:#3fb950} .stat .val.warn{color:#d29922} .stat .val.err{color:#f85149} .stat .val.decom{color:#bc8cff}
.stat .lbl{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;padding:8px 0}
.env-header{padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.env-header:hover{background:#1c2128}
.env-header.selected{background:#1c2128;border-left-color:#58a6ff}
.env-name{font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.env-count{font-size:11px;color:#8b949e}
.health-bar{height:4px;background:#21262d;border-radius:2px;margin-top:4px;display:flex;overflow:hidden;border-radius:2px}
.badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500}
.badge-decom{border:1px solid #bc8cff;color:#bc8cff}
.badge-ready{background:rgba(63,185,80,.15);border-color:#3fb950;color:#3fb950}
.badge-near-ready{background:rgba(210,153,34,.15);border-color:#d29922;color:#d29922}
.badge-transferred{background:rgba(139,148,158,.15);border-color:#8b949e;color:#8b949e}
.badge-gls{background:rgba(188,140,255,.15);border-color:#bc8cff;color:#bc8cff}
.badge-retained{background:rgba(88,166,255,.15);border-color:#58a6ff;color:#58a6ff}
.content{flex:1;overflow-y:auto;padding:20px}
.filter-bar{background:#161b22;border-bottom:1px solid #30363d;padding:8px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px}
.filter-bar label{color:#8b949e;font-weight:500}
.filter-bar select,.filter-bar input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-size:12px}
.filter-bar input{width:140px}
.rack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:16px}
.rack-card{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px;position:relative;transition:all .15s}
.rack-card:hover{border-color:#58a6ff;transform:translateY(-1px)}
.rack-name{font-size:11px;color:#f0f6fc;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rack-meta{font-size:10px;color:#8b949e;margin-top:4px}
.rack-machines{font-size:18px;font-weight:600;color:#58a6ff;margin-top:6px}
.rack-status-bar{height:6px;background:#21262d;border-radius:3px;margin-top:6px;display:flex;overflow:hidden}
.decom-tag{font-size:9px;padding:1px 5px;border-radius:3px;position:absolute;top:6px;right:6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.decom-banner{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:6px;margin-bottom:12px;border:1px solid}
.decom-banner.ready{background:rgba(63,185,80,.08);border-color:#3fb950}
.decom-banner.near-ready{background:rgba(210,153,34,.08);border-color:#d29922}
.decom-banner.transferred{background:rgba(139,148,158,.08);border-color:#8b949e}
.decom-banner.gls{background:rgba(188,140,255,.08);border-color:#bc8cff}
.decom-icon{font-size:24px}
.decom-info{flex:1}
.decom-date{font-size:13px;font-weight:600}
.decom-group{font-size:11px;color:#8b949e}
h2{font-size:16px;color:#f0f6fc;margin-bottom:12px}
.chart-section{margin-bottom:20px}
.chart-title{font-size:13px;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.bar-row{display:flex;align-items:center;margin-bottom:4px}
.bar-label{width:100px;font-size:11px;color:#8b949e;text-align:right;padding-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:18px;background:#21262d;border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:500;transition:width .3s}
.bar-val{width:80px;font-size:11px;color:#8b949e;padding-left:6px}
.sl{display:flex;align-items:center;gap:4px;font-size:11px;color:#c9d1d9;margin-bottom:2px}
.sl-dot{width:8px;height:8px;border-radius:50%}
.heatmap{display:grid;gap:2px;margin-top:8px}
.heatmap-cell{width:14px;height:14px;border-radius:2px;cursor:pointer}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#8b949e}
.legend-dot{width:10px;height:10px;border-radius:50%}
.color-toggle{display:flex;gap:4px;align-items:center;font-size:11px;color:#8b949e}
.color-toggle button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.color-toggle button.active{background:#58a6ff;color:#0d1117;border-color:#58a6ff}
.tooltip{display:none;position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:12px;z-index:1000;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none}
.tt-title{font-size:13px;font-weight:600;color:#f0f6fc;margin-bottom:8px;border-bottom:1px solid #30363d;padding-bottom:6px}
.tt-row{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
.tt-label{color:#8b949e}
.tt-val{color:#c9d1d9;font-weight:500}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>🔲 ODC PF Environment Dashboard</h1>
    <div class="sub">OneDrive ODCOR Production + ODUnallocated · DeviceManager (Kusto) + ODCView.csv Decom Data · Last 14 days</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="val" id="s-envs">-</div><div class="lbl">Environments</div></div>
    <div class="stat"><div class="val" id="s-racks">-</div><div class="lbl">Racks</div></div>
    <div class="stat"><div class="val" id="s-machines">-</div><div class="lbl">Machines</div></div>
    <div class="stat"><div class="val ok" id="s-healthy">-</div><div class="lbl">Healthy</div></div>
    <div class="stat"><div class="val err" id="s-failed">-</div><div class="lbl">Failed</div></div>
    <div class="stat"><div class="val decom" id="s-decom">-</div><div class="lbl">On Decom List</div></div>
    <div class="stat"><div class="val" style="color:#8b949e" id="s-completed">-</div><div class="lbl">Completed Decom</div></div>
  </div>
</div>
<div class="filter-bar">
  <label>Cluster:</label><select id="f-cluster"><option value="">All</option></select>
  <label>SKU:</label><select id="f-sku"><option value="">All</option></select>
  <label>Function:</label><select id="f-func"><option value="">All</option></select>
  <label>Status:</label><select id="f-status"><option value="">All</option><option value="has-failed">Has Failed</option><option value="all-healthy">All Healthy</option><option value="has-decom">Has Decommissioned</option></select>
  <label>Decom:</label><select id="f-decom"><option value="">All</option><option value="yes">On Decom List</option><option value="no">Not on Decom List</option><option value="Ready">Ready</option><option value="Near Ready">Near Ready</option><option value="GLS Infra Racks">GLS Infra Racks</option><option value="Transferred">Transferred</option></select>
  <input type="text" id="f-search" placeholder="Search racks...">
  <div class="color-toggle"><span>Color by:</span>
    <button data-mode="decom" class="active">Decom</button>
    <button data-mode="status">Status</button>
    <button data-mode="function">Function</button>
    <button data-mode="sku">SKU</button>
    <button data-mode="deployment">Deployment</button>
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div style="padding:12px 14px;color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Environments</div>
  </div>
  <div class="content" id="content">
    <div style="text-align:center;padding:80px;color:#8b949e">
      <div style="font-size:48px;margin-bottom:16px">🔲</div>
      <div>Select an environment from the sidebar</div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

const statusColors = { H: '#3fb950', P: '#d29922', C: '#58a6ff', F: '#f85149', D: '#8b949e', B: '#da3633' };
const statusLabels = { H: 'H', P: 'P', C: 'C', F: 'F', D: 'D', B: 'B' };
const statusTips = { H: 'Healthy', P: 'Provisioning', C: 'Configuring', F: 'Failed', D: 'Decommissioned', B: 'Blocked' };
const COMPLETED_DECOM = [
  { env: 'ODCOR002-SJC04P', cluster: 'SJC04P', date: '', group: 'Transferred', sku: 'WCS7', dest: '' },
  { env: 'ODCOR003-PHX02P', cluster: 'PHX02P', date: '4/1/2026', group: 'Ready', sku: 'WCS7', dest: 'ODUnallocated-Test-PHX02P' },
  { env: 'ODCOR004-BNZ06P', cluster: 'BNZ06P', date: '', group: 'Transferred', sku: 'WCS7', dest: '' },
  { env: 'ODCOR004-DSM01P', cluster: 'DSM01P', date: '4/1/2026', group: 'Ready', sku: 'WCS7', dest: 'ODUnallocated-Test-DSM01P' },
  { env: 'ODCOR006-BLZ04P', cluster: 'BLZ04P', date: '4/1/2026', group: 'Ready', sku: 'WCS7', dest: 'ODUnallocated-Test-BLZ04P' },
];
const funcColors = { API: '#58a6ff', APIS2S: '#bc8cff', JOB: '#d29922', NU: '#8b949e' };
const decomColors = { 'Ready': '#3fb950', 'Near Ready': '#d29922', 'GLS Infra Racks': '#bc8cff', 'Transferred': '#8b949e' };
const decomBadgeClass = { 'Ready': 'badge-ready', 'Near Ready': 'badge-near-ready', 'GLS Infra Racks': 'badge-gls', 'Transferred': 'badge-transferred' };

let selectedEnv = null;
let colorBy = 'decom';

function getFiltered() {
  const fc = document.getElementById('f-cluster').value;
  const fs = document.getElementById('f-sku').value;
  const ff = document.getElementById('f-func').value;
  const fst = document.getElementById('f-status').value;
  const fd = document.getElementById('f-decom').value;
  const fq = document.getElementById('f-search').value.toLowerCase();
  return DATA.filter(r => {
    if (fc && r.cluster !== fc) return false;
    if (fs && !r.skus.includes(fs)) return false;
    if (ff && !r.functions.includes(ff)) return false;
    if (fst === 'has-failed' && !r.status.F) return false;
    if (fst === 'all-healthy' && r.status.H !== r.machines) return false;
    if (fst === 'has-decom' && !r.status.D) return false;
    if (fd === 'yes' && !r.decom) return false;
    if (fd === 'no' && r.decom) return false;
    if (fd && fd !== 'yes' && fd !== 'no' && (!r.decom || r.decom.group !== fd)) return false;
    if (fq && !r.rack.toLowerCase().includes(fq) && !r.env.toLowerCase().includes(fq)) return false;
    return true;
  });
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div style="padding:4px 14px;font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px">Environments</div>';
  const filtered = getFiltered();
  const decomOrder = { 'Ready': 0, 'Near Ready': 1, 'GLS Infra Racks': 2, 'Transferred': 3 };
  const envDecom = {};
  filtered.forEach(r => { if (!envDecom[r.env] && r.decom) envDecom[r.env] = r.decom; });
  const envs = [...new Set(filtered.map(r => r.env))].sort((a, b) => {
    const da = envDecom[a], db = envDecom[b];
    const hasA = da ? 1 : 0, hasB = db ? 1 : 0;
    if (hasA !== hasB) return hasB - hasA;
    if (da && db) {
      const ga = decomOrder[da.group] ?? 99, gb = decomOrder[db.group] ?? 99;
      if (ga !== gb) return ga - gb;
      const parseD = s => { if (!s) return new Date(9999,0); const p = s.split('/'); return new Date(p[2], p[0]-1, p[1]); };
      const ddA = parseD(da.date), ddB = parseD(db.date);
      if (ddA.getTime() !== ddB.getTime()) return ddA - ddB;
    }
    return a.localeCompare(b);
  });
  const completedDests = new Set(COMPLETED_DECOM.map(cd => cd.dest).filter(Boolean));
  const sidebarEnvs = envs.filter(e => !completedDests.has(e));
  const total = filtered.reduce((s, r) => s + r.machines, 0);
  const totalH = filtered.reduce((s, r) => s + (r.status.H || 0), 0);
  const totalF = filtered.reduce((s, r) => s + (r.status.F || 0), 0);
  const decomMachines = filtered.filter(r => r.decom).reduce((s, r) => s + r.machines, 0);
  document.getElementById('s-envs').textContent = sidebarEnvs.length;
  document.getElementById('s-racks').textContent = filtered.length;
  document.getElementById('s-machines').textContent = total.toLocaleString();
  document.getElementById('s-healthy').textContent = total ? ((totalH / total * 100).toFixed(0) + '%') : '-';
  document.getElementById('s-failed').textContent = totalF;
  document.getElementById('s-decom').textContent = `${decomMachines.toLocaleString()} (${total ? (decomMachines / total * 100).toFixed(0) : 0}%)`;
  document.getElementById('s-completed').textContent = COMPLETED_DECOM.length;

  sidebarEnvs.forEach(env => {
    const envRacks = filtered.filter(r => r.env === env);
    const mc = envRacks.reduce((s, r) => s + r.machines, 0);
    const st = { H: 0, P: 0, C: 0, F: 0, D: 0, B: 0 };
    envRacks.forEach(r => { for (const k in st) st[k] += (r.status[k] || 0); });
    const total = Object.values(st).reduce((a, b) => a + b, 0);
    const div = document.createElement('div');
    const dc = envRacks[0] && envRacks[0].decom;
    let badgeHtml = '';
    if (dc) {
      const cls = decomBadgeClass[dc.group] || 'badge-decom';
      const dateStr = dc.date ? ' \u00b7 ' + dc.date : '';
      badgeHtml = `<div class="badges"><span class="badge badge-decom ${cls}">${dc.group}${dateStr}</span></div>`;
    }
    div.innerHTML = `<div class="env-header ${selectedEnv === env ? 'selected' : ''}" data-env="${env}">
      <div class="env-name"><span>${env.replace(/P00[01]-Prod-/,'-')}</span><span class="env-count">${mc} machines · ${envRacks.length} racks</span></div>
      ${badgeHtml}
      <div class="health-bar">${buildHealthBar(st, total)}</div>
    </div>`;
    div.querySelector('.env-header').onclick = () => { selectedEnv = env; buildSidebar(); renderContent(); };
    sb.appendChild(div);
  });

  // Completed decom section
  const cdDiv = document.createElement('div');
  cdDiv.style.cssText = 'border-top:1px solid #30363d;margin-top:8px;padding-top:8px';
  cdDiv.innerHTML = '<div style="padding:4px 14px;font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px">Completed / Removed</div>';
  COMPLETED_DECOM.forEach(cd => {
    const cls = decomBadgeClass[cd.group] || 'badge-decom';
    const dateStr = cd.date ? ' \u00b7 ' + cd.date : '';
    const el = document.createElement('div');
    const hasDestData = cd.dest && DATA.some(r => r.env === cd.dest);
    const destLink = hasDestData
      ? `<div class="env-header ${selectedEnv === cd.dest ? 'selected' : ''}" style="opacity:.8;cursor:pointer;padding:3px 14px 3px 28px;font-size:11px;color:#58a6ff">↳ ${cd.dest} <span style="color:#8b949e;font-size:10px">(view racks)</span></div>`
      : (cd.dest ? `<div style="font-size:10px;color:#58a6ff;margin-top:1px;padding-left:14px">→ ${cd.dest}</div>` : '');
    el.innerHTML = `<div class="env-header ${selectedEnv === cd.env ? 'selected' : ''}" style="opacity:.6;cursor:pointer;padding:5px 14px"><span style="text-decoration:line-through">${cd.env}</span><div class="badges"><span class="badge badge-decom ${cls}">${cd.group}${dateStr}</span></div></div>${destLink}`;
    el.querySelector('.env-header').onclick = () => { selectedEnv = cd.env; buildSidebar(); renderContent(); };
    if (hasDestData) {
      const destEl = el.querySelectorAll('.env-header')[1];
      if (destEl) destEl.onclick = (e) => { e.stopPropagation(); selectedEnv = cd.dest; buildSidebar(); renderContent(); };
    }
    cdDiv.appendChild(el);
  });
  sb.appendChild(cdDiv);
}

function buildHealthBar(st, total) {
  let html = '';
  for (const k of ['H', 'P', 'C', 'F', 'D', 'B']) {
    if (st[k]) {
      html += `<div style="width:${st[k] / total * 100}%;background:${statusColors[k]};min-width:1px" title="${statusTips[k]}: ${st[k]}"></div>`;
    }
  }
  return html;
}

function renderContent() {
  const ct = document.getElementById('content');
  if (!selectedEnv) {
    ct.innerHTML = '<div style="text-align:center;padding:80px;color:#8b949e"><div style="font-size:48px;margin-bottom:16px">🔲</div>Select an environment</div>';
    return;
  }

  // Check if this is a completed decom env
  const completedEnv = COMPLETED_DECOM.find(cd => cd.env === selectedEnv);
  if (completedEnv) {
    const cls = completedEnv.group === 'Ready' ? 'ready' : (completedEnv.group === 'Transferred' ? 'transferred' : 'near-ready');
    const dateStr = completedEnv.date || 'N/A';
    const destHtml = completedEnv.dest ? `<div style="margin-top:12px;padding:12px 16px;background:rgba(88,166,255,.08);border:1px solid #58a6ff;border-radius:6px;font-size:13px"><span style="color:#8b949e">Transferred to:</span> <span style="color:#58a6ff;font-weight:600">${completedEnv.dest}</span></div>` : '';
    ct.innerHTML = `<h2 style="text-decoration:line-through;opacity:.7">${completedEnv.env}</h2>
      <div class="decom-banner ${cls}" style="margin-top:12px">
        <div class="decom-icon">${completedEnv.group === 'Ready' ? '✅' : '⬜'}</div>
        <div class="decom-info">
          <div class="decom-date">WM Target: ${dateStr}</div>
          <div class="decom-group">${completedEnv.group} · Cluster: ${completedEnv.cluster} · HW SKU: ${completedEnv.sku} · No active machines in Kusto</div>
        </div>
      </div>
      ${destHtml}
      <div style="padding:40px;text-align:center;color:#8b949e;font-size:14px">
        <div style="font-size:48px;margin-bottom:12px">🏁</div>
        This environment has been fully decommissioned and removed from DeviceManager.<br>
        ${completedEnv.dest ? 'Machines were transferred to <b style="color:#58a6ff">' + completedEnv.dest + '</b>.' : 'No racks, machines, or deployments remain.'}
      </div>`;
    return;
  }

  const filtered = getFiltered().filter(r => r.env === selectedEnv);
  if (!filtered.length) {
    ct.innerHTML = `<h2>${selectedEnv}</h2><div style="padding:40px;text-align:center;color:#8b949e">No racks match current filters</div>`;
    return;
  }

  const totalMachines = filtered.reduce((s, r) => s + r.machines, 0);
  const envSt = { H: 0, P: 0, C: 0, F: 0, D: 0, B: 0 };
  filtered.forEach(r => { for (const k in envSt) envSt[k] += (r.status[k] || 0); });
  const funcs = {};
  filtered.forEach(r => r.functions.forEach(f => { funcs[f] = (funcs[f] || 0) + 1; }));
  const deployments = [...new Set(filtered.map(r => r.deploymentId))];
  const skus = [...new Set(filtered.flatMap(r => r.skus))];
  const dc = filtered[0].decom;

  let html = `<h2>${selectedEnv.replace(/P00[01]-Prod-/, '-')}</h2>`;

  // Decom banner
  if (dc) {
    const cls = dc.group === 'Ready' ? 'ready' : dc.group === 'Near Ready' ? 'near-ready' : dc.group === 'GLS Infra Racks' ? 'gls' : 'transferred';
    const icon = dc.group === 'Ready' ? '⚠️' : dc.group === 'Near Ready' ? '🔶' : '📋';
    const dateStr = dc.date || 'TBD';
    html += `<div class="decom-banner ${cls}"><div class="decom-icon">${icon}</div><div class="decom-info"><div class="decom-date">WM Target: ${dateStr}</div><div class="decom-group">${dc.group} · HW SKU: ${dc.sku}</div></div></div>`;
  }

  // Summary stats
  html += '<div class="chart-section"><div class="chart-title">Status Summary</div>';
  for (const k of ['H', 'P', 'C', 'F', 'D', 'B']) {
    if (envSt[k]) html += `<div class="sl"><div class="sl-dot" style="background:${statusColors[k]}"></div>${statusLabels[k]}: ${envSt[k]}</div>`;
  }
  html += `<div style="margin-top:4px;font-size:11px;color:#8b949e">${totalMachines} machines · ${filtered.length} racks · ${deployments.length} deployments · ${skus.join(', ')}</div></div>`;

  // Status bar chart
  html += '<div class="chart-section"><div class="chart-title">Machine Status</div>';
  for (const k of ['H', 'P', 'C', 'F', 'D', 'B']) {
    if (!envSt[k]) continue;
    const pct = (envSt[k] / totalMachines * 100).toFixed(1);
    html += `<div class="bar-row"><div class="bar-label">${statusLabels[k]}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${statusColors[k]}">${envSt[k] > 8 ? envSt[k] : ''}</div></div><div class="bar-val">${envSt[k]} (${pct}%)</div></div>`;
  }
  html += '</div>';

  // Color legend for rack view
  html += '<div class="chart-section"><div class="chart-title">Rack View</div>';
  html += '<div class="legend">';
  if (colorBy === 'decom') {
    html += '<div class="legend-item"><div class="legend-dot" style="background:#21262d"></div>No decom</div>';
    for (const [g, c] of Object.entries(decomColors)) html += `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${g}</div>`;
  } else if (colorBy === 'status') {
    for (const k of ['H', 'P', 'C', 'F', 'D', 'B']) html += `<div class="legend-item"><div class="legend-dot" style="background:${statusColors[k]}"></div>${statusLabels[k]}</div>`;
  } else if (colorBy === 'function') {
    for (const f of Object.keys(funcColors)) html += `<div class="legend-item"><div class="legend-dot" style="background:${funcColors[f]}"></div>${f}</div>`;
  } else if (colorBy === 'sku') {
    html += '<div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div>i26c</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#d29922"></div>i20c</div>';
  } else if (colorBy === 'deployment') {
    const depColorsLeg = ['#58a6ff', '#bc8cff', '#d29922', '#3fb950', '#f85149', '#8b949e', '#da3633', '#f0883e'];
    deployments.forEach((d, i) => { html += `<div class="legend-item"><div class="legend-dot" style="background:${depColorsLeg[i % depColorsLeg.length]}"></div>${d}</div>`; });
  }
  html += '</div>';
  html += '<div class="rack-grid">';
  filtered.forEach((r, i) => {
    const total = r.machines;
    let borderColor = '#30363d';
    if (colorBy === 'decom') borderColor = r.decom ? (decomColors[r.decom.group] || '#bc8cff') : '#30363d';
    else if (colorBy === 'status') {
      if (r.status.F) borderColor = statusColors.F;
      else if (r.status.D) borderColor = statusColors.D;
      else if (r.status.P) borderColor = statusColors.P;
      else if (r.status.C) borderColor = statusColors.C;
      else borderColor = statusColors.H;
    } else if (colorBy === 'function') {
      borderColor = funcColors[r.functions[0]] || '#58a6ff';
    } else if (colorBy === 'sku') {
      borderColor = r.skus[0] && r.skus[0].includes('i26c') ? '#58a6ff' : '#d29922';
    } else if (colorBy === 'deployment') {
      const depIdx = deployments.indexOf(r.deploymentId);
      const depColors = ['#58a6ff', '#bc8cff', '#d29922', '#3fb950', '#f85149', '#8b949e', '#da3633', '#f0883e'];
      borderColor = depColors[depIdx % depColors.length];
    }

    let decomTag = '';
    if (r.decom) {
      const cls = decomBadgeClass[r.decom.group] || 'badge-decom';
      const dateStr = r.decom.date || r.decom.group;
      decomTag = `<div class="decom-tag ${cls}">${dateStr}</div>`;
    }

    html += `<div class="rack-card" style="border-color:${borderColor}" data-ridx="${i}">
      ${decomTag}
      <div class="rack-name" title="${r.rack}">${r.rack.split('/').pop()}</div>
      <div class="rack-meta">${r.functions.join(', ')} · ${r.deploymentId}</div>
      <div class="rack-machines">${r.machines}<span style="font-size:11px;color:#8b949e;font-weight:400"> machines</span></div>
      <div class="rack-status-bar">${buildHealthBarHTML(r.status, total)}</div>
    </div>`;
  });
  html += '</div>';
  html += '</div>';


  // Function bar chart
  html += '<div class="chart-section"><div class="chart-title">Machine Functions (by rack presence)</div>';
  for (const [f, c] of Object.entries(funcs).sort((a, b) => b[1] - a[1])) {
    const pct = (c / filtered.length * 100).toFixed(1);
    html += `<div class="bar-row"><div class="bar-label">${f}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${funcColors[f] || '#58a6ff'}">${c > 3 ? c : ''}</div></div><div class="bar-val">${c} racks (${pct}%)</div></div>`;
  }
  html += '</div>';

  // Deployment bar chart
  if (deployments.length > 1) {
    html += '<div class="chart-section"><div class="chart-title">Deployments</div>';
    const depCounts = {};
    filtered.forEach(r => { depCounts[r.deploymentId] = (depCounts[r.deploymentId] || 0) + 1; });
    for (const [d, c] of Object.entries(depCounts).sort((a, b) => b[1] - a[1])) {
      const pct = (c / filtered.length * 100).toFixed(1);
      html += `<div class="bar-row"><div class="bar-label">${d}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#58a6ff">${c > 3 ? c : ''}</div></div><div class="bar-val">${c} racks (${pct}%)</div></div>`;
    }
    html += '</div>';
  }

  // Status by deployment heatmap
  if (deployments.length > 1) {
    html += '<div class="chart-section"><div class="chart-title">Status by Deployment</div>';
    for (const dep of deployments) {
      const depRacks = filtered.filter(r => r.deploymentId === dep);
      const depSt = { H: 0, P: 0, C: 0, F: 0, D: 0, B: 0 };
      depRacks.forEach(r => { for (const k in depSt) depSt[k] += (r.status[k] || 0); });
      const depTotal = Object.values(depSt).reduce((a, b) => a + b, 0);
      html += `<div style="margin-bottom:4px"><div style="font-size:11px;color:#8b949e;margin-bottom:2px">${dep} (${depRacks.length} racks, ${depTotal} machines)</div><div class="health-bar" style="height:8px">${buildHealthBarHTML(depSt, depTotal)}</div></div>`;
    }
    html += '</div>';
  }

  // Rack health heatmap
  html += '<div class="chart-section"><div class="chart-title">Rack Health Heatmap</div>';
  html += `<div class="heatmap" style="grid-template-columns:repeat(${Math.min(Math.ceil(Math.sqrt(filtered.length * 1.5)), 30)},14px)">`;
  filtered.forEach((r, i) => {
    const total = r.machines;
    const hPct = total ? r.status.H / total : 0;
    const color = hPct >= .95 ? '#3fb950' : hPct >= .7 ? '#d29922' : '#f85149';
    html += `<div class="heatmap-cell" style="background:${color}" title="${r.rack}: ${r.status.H}/${total} healthy" data-idx="${i}"></div>`;
  });
  html += '</div></div>';

  ct.innerHTML = html;

  // Tooltip
  ct.querySelectorAll('.rack-card').forEach(card => {
    card.addEventListener('mouseenter', e => showTooltip(e, filtered[parseInt(card.dataset.ridx)]));
    card.addEventListener('mouseleave', hideTooltip);
    card.addEventListener('mousemove', moveTooltip);
  });
}

function buildHealthBarHTML(st, total) {
  let html = '';
  for (const k of ['H', 'P', 'C', 'F', 'D', 'B']) {
    if (st[k]) html += `<div style="width:${st[k] / total * 100}%;background:${statusColors[k]};min-width:1px" title="${statusTips[k]}: ${st[k]}"></div>`;
  }
  return html;
}

function showTooltip(e, r) {
  const tt = document.getElementById('tooltip');
  const total = r.machines;
  let stRows = '';
  for (const k of ['H', 'P', 'C', 'F', 'D', 'B']) {
    if (r.status[k]) stRows += `<div class="tt-row"><span class="tt-label" style="color:${statusColors[k]}">${k} (${statusTips[k]})</span><span class="tt-val">${r.status[k]} (${(r.status[k] / total * 100).toFixed(0)}%)</span></div>`;
  }
  let decomInfo = '';
  if (r.decom) {
    const dateStr = r.decom.date || 'TBD';
    decomInfo = `<div class="tt-row" style="margin-top:6px;border-top:1px solid #30363d;padding-top:4px"><span class="tt-label" style="color:#bc8cff">Decom</span><span class="tt-val">${r.decom.group} · ${dateStr}</span></div>`;
  }
  tt.innerHTML = `<div class="tt-title">${r.rack}</div>
    <div class="tt-row"><span class="tt-label">Environment</span><span class="tt-val">${r.env.replace(/P00[01]-Prod-/, '-')}</span></div>
    <div class="tt-row"><span class="tt-label">Cluster</span><span class="tt-val">${r.cluster}</span></div>
    <div class="tt-row"><span class="tt-label">Deployment</span><span class="tt-val">${r.deploymentId}</span></div>
    <div class="tt-row"><span class="tt-label">Functions</span><span class="tt-val">${r.functions.join(', ')}</span></div>
    <div class="tt-row"><span class="tt-label">SKUs</span><span class="tt-val">${r.skus.join(', ')}</span></div>
    <div class="tt-row"><span class="tt-label">Machines</span><span class="tt-val">${r.machines}</span></div>
    <div style="margin-top:6px;border-top:1px solid #30363d;padding-top:4px">${stRows}</div>
    ${decomInfo}`;
  tt.style.display = 'block';
}

function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 12, y = e.clientY + 12;
  if (x + 240 > window.innerWidth) x = e.clientX - 240;
  if (y + 200 > window.innerHeight) y = e.clientY - 200;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}

function initFilters() {
  const clusters = [...new Set(DATA.map(r => r.cluster))].sort();
  const skus = [...new Set(DATA.flatMap(r => r.skus))].sort();
  const funcs = [...new Set(DATA.flatMap(r => r.functions))].sort();
  clusters.forEach(c => { document.getElementById('f-cluster').innerHTML += `<option value="${c}">${c}</option>`; });
  skus.forEach(s => { document.getElementById('f-sku').innerHTML += `<option value="${s}">${s}</option>`; });
  funcs.forEach(f => { document.getElementById('f-func').innerHTML += `<option value="${f}">${f}</option>`; });
  ['f-cluster', 'f-sku', 'f-func', 'f-status', 'f-decom'].forEach(id => document.getElementById(id).onchange = () => { buildSidebar(); renderContent(); });
  document.getElementById('f-search').oninput = () => { buildSidebar(); renderContent(); };
}

document.querySelectorAll('.color-toggle button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.color-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    colorBy = btn.dataset.mode;
    renderContent();
  };
});

initFilters();
selectedEnv = [...new Set(DATA.map(r => r.env))].sort()[0];
buildSidebar();
renderContent();
</script>
</body>
</html>
